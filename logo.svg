<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9AF2FF"></stop>
      <stop offset="100%" stop-color="#5BCEDB"></stop>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6FE7F5"></stop>
      <stop offset="100%" stop-color="#9AF2FF"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0B1E24"></rect>

  <!-- LOGO -->
  <g transform="translate(70,35)">
    <!-- L -->
    <path d="M30 10 
             L60 10 
             L60 120 
             L120 120 
             L120 145 
             L30 145 Z" fill="url(#logoGrad)"></path>

    <!-- P (CLEAR & ROUNDED) -->
    <path d="M120 10 
             L165 10 
             C200 10 210 30 210 55 
             C210 80 200 100 165 100 
             L150 100 
             L150 75 
             L165 75 
             C180 75 185 68 185 55 
             C185 42 180 35 165 35 
             L120 35 Z" fill="url(#logoGrad)"></path>

    <!-- Circuit dots -->
    <circle cx="20" cy="25" r="5" fill="#6FE7F5"></circle>
    <circle cx="15" cy="80" r="5" fill="#6FE7F5"></circle>
    <circle cx="60" cy="160" r="5" fill="#6FE7F5"></circle>
    <circle cx="210" cy="35" r="5" fill="#6FE7F5"></circle>
    <circle cx="225" cy="85" r="5" fill="#6FE7F5"></circle>

    <!-- Circuit lines -->
    <line x1="20" y1="25" x2="45" y2="40" stroke="#6FE7F5" stroke-width="2"></line>
    <line x1="15" y1="80" x2="45" y2="80" stroke="#6FE7F5" stroke-width="2"></line>
    <line x1="60" y1="160" x2="75" y2="135" stroke="#6FE7F5" stroke-width="2"></line>
    <line x1="210" y1="35" x2="195" y2="50" stroke="#6FE7F5" stroke-width="2"></line>
    <line x1="225" y1="85" x2="195" y2="85" stroke="#6FE7F5" stroke-width="2"></line>
  </g>

  <!-- TEXT -->
  <text x="320" y="125" font-family="Segoe UI, Poppins, Arial, sans-serif" font-size="96" font-weight="600" fill="url(#textGrad)">
    LixoraPay
  </text>
</svg>
